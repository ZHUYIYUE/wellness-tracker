services:
  - type: web
    name: wellness-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    database:
      name: wellness-tracker-db
      plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: wellness-tracker-db
          property: connectionString
